services:
  x8-api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    env_file:
      - .env.example
      - .env
    environment:
      PYTHONPATH: /app/src
      X8_CHAT_PROVIDER: ${X8_CHAT_PROVIDER:-openwebui}
      X8_OPEN_WEBUI_BASE_URL: ${X8_OPEN_WEBUI_BASE_URL:-${OPENWEBUI_BASE_URL:-http://host.docker.internal:3000}}
      X8_OPENWEBUI_BASE_URL: ${X8_OPENWEBUI_BASE_URL:-${OPENWEBUI_BASE_URL:-http://host.docker.internal:3000}}
      OPENWEBUI_BASE_URL: ${OPENWEBUI_BASE_URL:-${X8_OPEN_WEBUI_BASE_URL:-http://host.docker.internal:3000}}
      X8_OPEN_WEBUI_API_KEY: ${X8_OPEN_WEBUI_API_KEY:-${OPENWEBUI_API_KEY:-}}
      X8_OPENWEBUI_API_KEY: ${X8_OPENWEBUI_API_KEY:-${OPENWEBUI_API_KEY:-}}
      OPENWEBUI_API_KEY: ${OPENWEBUI_API_KEY:-${X8_OPEN_WEBUI_API_KEY:-}}
      X8_OPEN_WEBUI_MODEL: ${X8_OPEN_WEBUI_MODEL:-${OPENWEBUI_MODEL:-qwen3:8b}}
      X8_OPENWEBUI_MODEL: ${X8_OPEN_WEBUI_MODEL:-${OPENWEBUI_MODEL:-qwen3:8b}}
      OPENWEBUI_MODEL: ${OPENWEBUI_MODEL:-${X8_OPEN_WEBUI_MODEL:-qwen3:8b}}
      X8_OPEN_WEBUI_MODEL_ALIASES: ${X8_OPEN_WEBUI_MODEL_ALIASES:-${OPENWEBUI_MODEL_ALIASES:-qwen3:14b;qwen3:8b;qwen3:1.7b}}
      X8_OPENWEBUI_MODEL_ALIASES: ${X8_OPEN_WEBUI_MODEL_ALIASES:-${OPENWEBUI_MODEL_ALIASES:-qwen3:14b;qwen3:8b;qwen3:1.7b}}
      OPENWEBUI_MODEL_ALIASES: ${OPENWEBUI_MODEL_ALIASES:-${X8_OPEN_WEBUI_MODEL_ALIASES:-qwen3:14b;qwen3:8b;qwen3:1.7b}}
      X8_GITHUB_TOKEN: ${X8_GITHUB_TOKEN:-}
      X8_GITHUB_OWNER: ${X8_GITHUB_OWNER:-otiseduncan}
      X8_GITHUB_DEFAULT_VISIBILITY: ${X8_GITHUB_DEFAULT_VISIBILITY:-private}
      X8_WORKSPACE_HOST_ROOT: ${X8_WORKSPACE_HOST_ROOT:-../xoduz-sandbox}
      X8_PROJECTS_HOST_ROOT: ${X8_PROJECTS_HOST_ROOT:-../xoduz-sandbox}
      X8_LOCAL_BRIDGE_URL: ${X8_LOCAL_BRIDGE_URL:-http://x8-local-bridge:5788}
      X8_LOCAL_BRIDGE_TOKEN: ${X8_LOCAL_BRIDGE_TOKEN:-}
    ports:
      - "${X8_API_PORT:-8080}:8080"
    depends_on:
      x8-postgres:
        condition: service_healthy
      x8-redis:
        condition: service_started
      x8-local-bridge:
        condition: service_started
    volumes:
      - ./apps/api/src:/app/src:ro
      - ./knowledge:/app/knowledge:ro
      - .:/workspace
      - "${X8_PROJECTS_HOST_ROOT:-../xoduz-sandbox}:/projects"
      - "X:/XV7/xv7:/imports/x7:ro"
      - "X:/X-V-6.1:/imports/x6:ro"
      - /var/run/docker.sock:/var/run/docker.sock
      - x8-audit:/app/runtime

  x8-web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      target: dev
    env_file:
      - .env.example
      - .env
    ports:
      - "${X8_WEB_PORT:-5173}:5173"
    depends_on:
      - x8-api

  x8-cockpit:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      target: dev
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "6022"]
    env_file:
      - .env.example
      - .env
    ports:
      - "${X8_COCKPIT_PORT:-6022}:6022"
    depends_on:
      - x8-api

  x8-postgres:
    image: postgres:16-alpine
    env_file:
      - .env.example
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U x8 -d x8"]
      interval: 2s
      timeout: 5s
      retries: 20
    volumes:
      - x8-postgres-data:/var/lib/postgresql/data

  x8-redis:
    image: redis:7-alpine
    volumes:
      - x8-redis-data:/data

  x8-ollama:
    image: ollama/ollama:latest
    volumes:
      - x8-ollama-data:/root/.ollama
    profiles: ["llm"]

  x8-searxng:
    image: searxng/searxng:latest
    environment:
      - SEARXNG_BASE_URL=http://x8-searxng:8080/
    volumes:
      - x8-searxng-data:/etc/searxng
    profiles: ["search"]

  x8-comfyui:
    image: ghcr.io/ai-dock/comfyui:latest
    environment:
      - COMFYUI_DISABLE_EXTERNAL_API_NODES=${X8_COMFYUI_DISABLE_EXTERNAL_API_NODES:-true}
    ports:
      - "${X8_COMFYUI_HOST_PORT:-8188}:8188"
    volumes:
      - x8-comfyui-output:/outputs
      - x8-comfyui-workflows:/workflows
      - type: bind
        source: ${X8_COMFYUI_HOST_MODELS_PATH:-./runtime/comfyui-models}
        target: /models/checkpoints
    profiles: ["image"]

  x8-qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${X8_QDRANT_HOST_PORT:-6333}:6333"
    volumes:
      - x8-qdrant-data:/qdrant/storage
    profiles: ["memory"]

  x8-local-bridge:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    command: ["uvicorn", "x8.local_bridge_app:app", "--host", "0.0.0.0", "--port", "5788"]
    env_file:
      - .env.example
      - .env
    environment:
      PYTHONPATH: /app/src
      X8_WORKSPACE_HOST_ROOT: ${X8_WORKSPACE_HOST_ROOT:-../xoduz-sandbox}
      X8_PROJECTS_HOST_ROOT: ${X8_PROJECTS_HOST_ROOT:-../xoduz-sandbox}
    volumes:
      - ./apps/api/src:/app/src:ro
      - .:/workspace:ro
      - "X:/XV7/xv7:/imports/x7:ro"
      - "X:/X-V-6.1:/imports/x6:ro"

  x8-worker:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    command: ["python", "-m", "x8.worker"]
    env_file:
      - .env.example
      - .env
    environment:
      PYTHONPATH: /app/src
    depends_on:
      - x8-redis
    profiles: ["worker"]

  x8-seed-loader:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    command: ["python", "-m", "x8.seed_loader"]
    environment:
      PYTHONPATH: /app/src
    volumes:
      - ./apps/api/src:/app/src:ro
      - ./knowledge:/app/knowledge:ro
    profiles: ["tools"]

  api-tests:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    command: ["python", "-m", "pytest", "tests"]
    env_file:
      - .env.example
      - .env
    environment:
      PYTHONPATH: /app/src
      X8_WORKSPACE_ROOT: /workspace
      X8_WORKSPACE_HOST_ROOT: /workspace
      X8_PROJECTS_HOST_ROOT: /workspace
      X8_CHAT_PROVIDER: ${X8_CHAT_PROVIDER:-openwebui}
      X8_OPEN_WEBUI_BASE_URL: ${X8_OPEN_WEBUI_BASE_URL:-${OPENWEBUI_BASE_URL:-http://host.docker.internal:3000}}
      X8_OPENWEBUI_BASE_URL: ${X8_OPENWEBUI_BASE_URL:-${OPENWEBUI_BASE_URL:-http://host.docker.internal:3000}}
      OPENWEBUI_BASE_URL: ${OPENWEBUI_BASE_URL:-${X8_OPEN_WEBUI_BASE_URL:-http://host.docker.internal:3000}}
      X8_OPEN_WEBUI_API_KEY: ${X8_OPEN_WEBUI_API_KEY:-${OPENWEBUI_API_KEY:-}}
      X8_OPENWEBUI_API_KEY: ${X8_OPENWEBUI_API_KEY:-${OPENWEBUI_API_KEY:-}}
      OPENWEBUI_API_KEY: ${OPENWEBUI_API_KEY:-${X8_OPEN_WEBUI_API_KEY:-}}
      X8_OPEN_WEBUI_MODEL: ${X8_OPEN_WEBUI_MODEL:-${OPENWEBUI_MODEL:-qwen3:8b}}
      X8_OPENWEBUI_MODEL: ${X8_OPEN_WEBUI_MODEL:-${OPENWEBUI_MODEL:-qwen3:8b}}
      OPENWEBUI_MODEL: ${OPENWEBUI_MODEL:-${X8_OPEN_WEBUI_MODEL:-qwen3:8b}}
      X8_OPEN_WEBUI_MODEL_ALIASES: ${X8_OPEN_WEBUI_MODEL_ALIASES:-${OPENWEBUI_MODEL_ALIASES:-qwen3:14b;qwen3:8b;qwen3:1.7b}}
      X8_OPENWEBUI_MODEL_ALIASES: ${X8_OPEN_WEBUI_MODEL_ALIASES:-${OPENWEBUI_MODEL_ALIASES:-qwen3:14b;qwen3:8b;qwen3:1.7b}}
      OPENWEBUI_MODEL_ALIASES: ${OPENWEBUI_MODEL_ALIASES:-${X8_OPEN_WEBUI_MODEL_ALIASES:-qwen3:14b;qwen3:8b;qwen3:1.7b}}
    depends_on:
      x8-postgres:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/src:ro
      - ./apps/api/tests:/app/tests:ro
      - .:/workspace
      - "${X8_PROJECTS_HOST_ROOT:-../xoduz-sandbox}:/projects"
      - "X:/XV7/xv7:/imports/x7:ro"
      - "X:/X-V-6.1:/imports/x6:ro"
    profiles: ["test"]

  web-tests:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      target: test
    command: ["npm", "test", "--", "--run"]
    profiles: ["test"]

  e2e-tests:
    build:
      context: .
      dockerfile: docker/e2e/Dockerfile
    command: ["npx", "playwright", "test"]
    depends_on:
      - x8-api
      - x8-web
    profiles: ["test"]

  e2e-fast-tests:
    build:
      context: .
      dockerfile: docker/e2e/Dockerfile
    command:
      - "npx"
      - "playwright"
      - "test"
      - "tests/smoke.spec.ts"
      - "--grep-invert"
      - "chat loop returns honest model status|self-build smoke proof applies|Brain auto-capture|Brain semantic retrieval"
    depends_on:
      - x8-api
      - x8-web
    profiles: ["test"]

  e2e-brain-tests:
    build:
      context: .
      dockerfile: docker/e2e/Dockerfile
    command:
      - "npx"
      - "playwright"
      - "test"
      - "tests/smoke.spec.ts"
      - "--grep"
      - "Brain auto-capture|Brain semantic retrieval"
    depends_on:
      - x8-api
      - x8-web
    profiles: ["test"]

  e2e-self-build-tests:
    build:
      context: .
      dockerfile: docker/e2e/Dockerfile
    command:
      - "npx"
      - "playwright"
      - "test"
      - "tests/smoke.spec.ts"
      - "--grep"
      - "self-build smoke proof applies"
    depends_on:
      - x8-api
      - x8-web
    profiles: ["test"]

  architecture-guard:
    build:
      context: .
      dockerfile: docker/architecture-guard/Dockerfile
    command: ["python", "scripts/architecture_guard.py"]
    profiles: ["guard"]

volumes:
  x8-postgres-data:
  x8-redis-data:
  x8-ollama-data:
  x8-qdrant-data:
  x8-searxng-data:
  x8-comfyui-output:
  x8-comfyui-workflows:
  x8-audit:
