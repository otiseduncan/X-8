services:
  x8-openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "${X8_OPENWEBUI_PORT:-3000}:8080"
    environment:
      USE_OLLAMA_DOCKER: "false"
      OLLAMA_BASE_URL: ${OPENWEBUI_OLLAMA_BASE_URL:-${X8_OLLAMA_BASE_URL:-http://host.docker.internal:11434}}
      # Keep OpenWebUI token/session signing stable across container recreates.
      # Do not rotate this casually: existing bearer/session tokens can be rejected
      # when the OpenWebUI signing secret changes.
      WEBUI_SECRET_KEY: ${OPENWEBUI_SECRET_KEY:-${WEBUI_SECRET_KEY:-}}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - open-webui:/app/backend/data

volumes:
  open-webui:
