services:
  x8-openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "${X8_OPENWEBUI_PORT:-3000}:8080"
    environment:
      USE_OLLAMA_DOCKER: "false"
      OLLAMA_BASE_URL: ${OPENWEBUI_OLLAMA_BASE_URL:-${X8_OLLAMA_BASE_URL:-http://host.docker.internal:11434}}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - open-webui:/app/backend/data

volumes:
  open-webui:
