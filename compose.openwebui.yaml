services:
  x8-openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "${X8_OPENWEBUI_PORT:-3000}:8080"
    environment:
      USE_OLLAMA_DOCKER: "false"
      OLLAMA_BASE_URL: ${OPENWEBUI_OLLAMA_BASE_URL:-${X8_OLLAMA_BASE_URL:-http://host.docker.internal:11434}}
      # Do not set WEBUI_SECRET_KEY here unless the operator explicitly adds it
      # to .env. Passing an empty or new signing secret can invalidate existing
      # OpenWebUI bearer/session tokens even when the token value itself did not
      # change. Existing development keys should remain owned by OpenWebUI's
      # persisted data store.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - open-webui:/app/backend/data

volumes:
  open-webui:
